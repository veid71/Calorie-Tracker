name: Build Food Database

# Runs automatically on the 1st of every month at 02:00 UTC.
# Can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to push database_version.json and create releases

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # OFFs export is large; allow up to 6 hours

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Free up disk space (GitHub runners are tight) ─────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Disk space check before build ─────────────────────────────────────
      - name: Check disk space before build
        run: df -h

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build database
        run: python scripts/build_database.py

      # ── Read metadata ─────────────────────────────────────────────────────
      - name: Read build metadata
        id: meta
        run: |
          VERSION=$(python -c "import json; d=json.load(open('output/database_version.json')); print(d['version'])")
          COUNT=$(python -c "import json; d=json.load(open('output/database_version.json')); print(d['product_count'])")
          SIZE_MB=$(python -c "import json; d=json.load(open('output/database_version.json')); print(round(d['file_size_bytes']/1024/1024,1))")
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "count=$COUNT"       >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE_MB"   >> $GITHUB_OUTPUT

      # ── Publish release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: db-${{ steps.meta.outputs.version }}
          name: "Food Database ${{ steps.meta.outputs.version }}"
          body: |
            ## Open Food Facts Database — ${{ steps.meta.outputs.version }}

            | Field | Value |
            |---|---|
            | Products | ${{ steps.meta.outputs.count }} |
            | File size | ${{ steps.meta.outputs.size_mb }} MB (compressed) |
            | Source | [Open Food Facts](https://world.openfoodfacts.org) |

            ### How to update in the app
            Go to **Settings → Regional → Download Food Database** and tap **"Check for update"**.
          files: output/openfoodfacts.db.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Update version JSON with real download URL ─────────────────────
      - name: Update database_version.json
        run: |
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/db-${{ steps.meta.outputs.version }}/openfoodfacts.db.gz"
          python - <<'EOF'
          import json, os, sys
          asset_url = os.environ["ASSET_URL"]
          with open("output/database_version.json") as f:
              d = json.load(f)
          d["download_url"] = asset_url
          with open("database_version.json", "w") as f:
              json.dump(d, f, indent=2)
          print(f"Updated download_url to: {asset_url}")
          EOF
        env:
          ASSET_URL: "https://github.com/${{ github.repository }}/releases/download/db-${{ steps.meta.outputs.version }}/openfoodfacts.db.gz"

      # ── Commit updated version JSON back to main ───────────────────────
      - name: Commit version JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database_version.json
          git diff --staged --quiet || git commit -m "chore: update database_version.json for ${{ steps.meta.outputs.version }}"
          git push
